# Security headers
more_set_headers "X-Frame-Options: SAMEORIGIN";
more_set_headers "X-Content-Type-Options: nosniff";
more_set_headers "X-XSS-Protection: 1; mode=block";
more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

# ---------------------------------------------------------------------------
# Operator scope — full SaaS platform (control-plane + console)
# ---------------------------------------------------------------------------
#NEXORA_IF_OPERATOR

location = __PATH__ {
    return 301 __PATH__/;
}

location __PATH__/ {
    proxy_pass http://127.0.0.1:__PORT__/console/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}

location __PATH__/api/ {
    proxy_pass http://127.0.0.1:__PORT__/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}

#NEXORA_IF_HIDE_YNH_ADMIN
# Block access to YunoHost admin panel through the Nexora domain —
# operators manage everything via the Nexora console exclusively.
location /yunohost/admin {
    return 403;
}
location /yunohost/api {
    return 403;
}
#NEXORA_ENDIF_HIDE_YNH_ADMIN

#NEXORA_ENDIF_OPERATOR

# ---------------------------------------------------------------------------
# Subscriber scope — node-agent only (enrollment + health endpoints)
# ---------------------------------------------------------------------------
#NEXORA_IF_SUBSCRIBER

location __PATH__/ {
    return 403;
}

location __PATH__/api/health {
    proxy_pass http://127.0.0.1:__PORT__/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}

location __PATH__/api/fleet/enroll/ {
    proxy_pass http://127.0.0.1:__PORT__/api/fleet/enroll/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}

#NEXORA_ENDIF_SUBSCRIBER
