test_format = 1

[default]

    [default.test_upgrade]
    # Upgrade from current version
    name = "Upgrade from same version"

    [default.test_backup_restore]
    # Standard backup + restore cycle
    name = "Backup and restore"

[multi]

    [multi.test_change_url]
    # Test change_url: move from /nexora to /nx
    name = "Change URL path"

[with_subdir]
    # Install under a sub-path (default)
    path = "/nexora"

    [with_subdir.test_install]
    name = "Install on sub-path"

    [with_subdir.test_upgrade]
    name = "Upgrade on sub-path"

    [with_subdir.test_backup_restore]
    name = "Backup-restore on sub-path"

[root]
    # Install at root
    path = "/"

    [root.test_install]
    name = "Install at root"
