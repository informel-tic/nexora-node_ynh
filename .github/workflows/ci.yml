name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint tools
        run: python -m pip install --upgrade pip && python -m pip install ruff mypy pyyaml fastapi uvicorn pydantic
      - name: Run ruff (linting + formatting check)
        run: ruff check src/ apps/ --output-format=github
      - name: Run ruff format check
        run: ruff format --check src/ apps/
      - name: Run mypy (type checking)
        run: mypy src/nexora_core/ --ignore-missing-imports --no-error-summary || true

  docs-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml pytest fastapi uvicorn pydantic
      - name: Docs inventory contract checks
        run: PYTHONPATH=src python -m pytest tests/test_docs_inventory_contract.py -q
      - name: CI contract checks
        run: PYTHONPATH=src python -m pytest tests/test_ci_guardrails.py -q
      - name: Package contract checks
        run: PYTHONPATH=src python -m pytest tests/test_package_contract.py -q

  tests:
    needs: [docs-quality, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install pyyaml fastapi uvicorn pydantic pytest
      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests/ -v --tb=short --junitxml=dist/ci/junit.xml
      - name: Upload CI runtime report
        uses: actions/upload-artifact@v4
        with:
          name: ci-runtime-report-${{ matrix.python-version }}
          path: |
            dist/ci/junit.xml
