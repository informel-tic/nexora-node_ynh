name: package-lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate YunoHost packaging files
        run: |
          test -f ynh-package/manifest.toml
          test -f ynh-package/tests.toml
          test -f ynh-package/scripts/install
          test -f ynh-package/scripts/remove
          test -f ynh-package/scripts/upgrade
          test -f ynh-package/scripts/backup
          test -f ynh-package/scripts/restore