# Nexora Node Agent — Subscriber Nginx Configuration
# Security headers
more_set_headers "X-Frame-Options: SAMEORIGIN";
more_set_headers "X-Content-Type-Options: nosniff";
more_set_headers "X-XSS-Protection: 1; mode=block";
more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

# Block console/admin access — subscriber has no console
location = __PATH__ {
    return 403;
}

location __PATH__/ {
    return 403;
}

# Health endpoint — always accessible for monitoring
location __PATH__/health {
    proxy_pass http://127.0.0.1:__PORT__/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}

# Enrollment endpoint — used during initial enrollment handshake
location __PATH__/api/fleet/enroll/ {
    proxy_pass http://127.0.0.1:__PORT__/api/fleet/enroll/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}

# Heartbeat endpoint — for control-plane to push commands
location __PATH__/api/heartbeat {
    proxy_pass http://127.0.0.1:__PORT__/api/heartbeat;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}

# Overlay status reporting endpoint
location __PATH__/overlay/status {
    proxy_pass http://127.0.0.1:__PORT__/overlay/status;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
}
